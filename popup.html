<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoApply</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
    }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      color: white;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header .tagline {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    .status-bar {
      padding: 10px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      flex-shrink: 0;
    }

    .status-dot.warning { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
    .status-dot.error { background: #f87171; box-shadow: 0 0 6px #f87171; }

    .status-text { color: #aaa; }
    .status-text strong { color: #f0f0f0; }

    .body { padding: 16px 20px; }

    .profile-card {
      background: #1e1e2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .profile-card .name {
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
    }

    .profile-card .meta {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
    }

    .profile-card .completeness {
      margin-top: 10px;
    }

    .profile-card .completeness-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
    }

    .progress-bar {
      height: 4px;
      background: #2a2a3a;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #a78bfa);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .no-profile {
      text-align: center;
      padding: 14px;
      color: #888;
      font-size: 13px;
      background: #1a1a2a;
      border: 1px dashed #2a2a4a;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .no-profile .icon { font-size: 24px; margin-bottom: 6px; }

    .btn {
      display: block;
      width: 100%;
      padding: 11px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: #2a2a3a;
      color: #ccc;
      border: 1px solid #3a3a5a;
      margin-top: 8px;
    }

    .btn-secondary:hover { background: #333350; color: #f0f0f0; }

    .btn-outline {
      background: transparent;
      color: #888;
      border: 1px solid #2a2a3a;
      margin-top: 8px;
      font-size: 12px;
    }

    .btn-outline:hover { border-color: #667eea; color: #667eea; }

    .ai-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e1e2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }

    .ai-toggle .label {
      font-size: 13px;
      color: #ccc;
    }

    .ai-toggle .label small {
      display: block;
      font-size: 11px;
      color: #666;
      margin-top: 1px;
    }

    .toggle {
      position: relative;
      width: 38px;
      height: 22px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: 0.2s;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      left: 3px;
      top: 3px;
      transition: 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: #667eea; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }

    .sites-detected {
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #4ade80;
    }

    .sites-detected .site-name { font-weight: 600; }

    .footer {
      padding: 10px 20px 14px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer a {
      font-size: 11px;
      color: #555;
      text-decoration: none;
      cursor: pointer;
    }

    .footer a:hover { color: #888; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 14px;
      left: 14px;
      right: 14px;
      background: #1e3a1e;
      border: 1px solid #2a5a2a;
      color: #4ade80;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      animation: slideUp 0.2s ease;
    }

    .toast.error { background: #3a1e1e; border-color: #5a2a2a; color: #f87171; }

    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    #fill-btn { margin-bottom: 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">A</div>
    <div>
      <h1>AutoApply</h1>
      <div class="tagline">AI-powered job form filler</div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">Detecting page...</div>
  </div>

  <div class="body">
    <div id="profile-section"></div>

    <div id="site-detected" class="sites-detected" style="display:none;">
      ✓ Job application form detected on <span class="site-name" id="detected-site"></span>
    </div>

    <div class="ai-toggle">
      <div class="label">
        AI Mode
        <small>Generate cover letters & custom answers</small>
      </div>
      <label class="toggle">
        <input type="checkbox" id="ai-toggle" checked />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <button class="btn btn-primary" id="fill-btn" disabled>
      <span id="fill-btn-text">Fill Application</span>
    </button>
    <button class="btn btn-secondary" id="options-btn">Edit Profile</button>
    <a class="btn btn-outline" id="report-btn">Report an issue with this page</a>
  </div>

  <div class="footer">
    <a id="history-link">Fill history</a>
    <a id="settings-link">Settings</a>
    <a id="help-link">Help</a>
  </div>

  <div class="toast" id="toast"></div>

  <script src="src/popup.js"></script>
</body>
</html>
